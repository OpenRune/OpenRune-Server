[versions]
fastutil = "8.2.1"
kotlinStdlibJdk8 = "2.0.20"
kotlinLogging = "5.1.0"
jackson = "2.17.2"
json = "20220320"
jbcrypt = "0.4"
gson = "2.10.1"
kotlinxSerializationCore = "1.6.3"
mongo = "5.1.2"
junit = "4.13.2"
